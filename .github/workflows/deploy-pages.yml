name: Deploy NOVARCH website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          npm install ajv@8 --no-save --legacy-peer-deps --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Add GitHub Pages SPA fallback and custom domain
        run: |
          cp frontend/build/index.html frontend/build/404.html
          echo "novarch.eu" > frontend/build/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
